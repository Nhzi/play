# Netlify build config — the Next.js app lives in ./app
# Netlify auto-installs @netlify/plugin-nextjs when it detects Next.js in the base dir.

[build]
  base    = ""
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Next.js 16 requires Node 20.9+
  NODE_VERSION = "20"
  # Skip dev-only audit chatter
  NPM_FLAGS    = "--no-audit --no-fund"
